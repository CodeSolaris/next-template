name: DB Migrations
on:
  workflow_call:
    inputs:
      branch_name:
        required: true
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Project
        uses: ./.github/actions/setup-project
        with:
          node-version: 'lts/*'

      - name: Set Environment
        id: db-env
        shell: bash
        env:
          PROD_URL: ${{ secrets.DATABASE_URL_PROD }}
          PREVIEW_URL: ${{ secrets.DATABASE_URL_PREVIEW }}
          BRANCH: ${{ inputs.branch_name }}
        run: |
          if [[ "$BRANCH" == "main" ]]; then
            echo "DATABASE_URL=$PROD_URL" >> $GITHUB_ENV
          else
            echo "DATABASE_URL=$PREVIEW_URL" >> $GITHUB_ENV
          fi

      - name: Run Drizzle Migrations
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
