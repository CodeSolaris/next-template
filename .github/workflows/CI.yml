name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up environment
        uses: ./.github/actions/setup-project

      - name: Type Check
        run: bun run check:types

      - name: Lint
        run: bun run lint

      - name: Build Next.js
        run: bun run build

      - name: Run Unit Tests
        run: bun run test:run
