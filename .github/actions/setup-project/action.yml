name: Setup Bun and dependencies
description: Clean and fast setup using Bun global cache and Next.js cache

inputs:
  node-version:
    description: Node.js version
    required: false
    default: 'lts/*'
  restore-nextjs-cache:
    description: Whether to restore Next.js build cache
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Cache Bun global cache
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-global-${{ hashFiles('**/bun.lock*') }}
        restore-keys: |
          ${{ runner.os }}-bun-global-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Cache Next.js build
      if: inputs.restore-nextjs-cache == 'true'
      uses: actions/cache@v5
      with:
        path: .next/cache
        key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock*', '**/next.config.*', '**/package.json', '**/tsconfig.json') }}
        restore-keys: |
          ${{ runner.os }}-nextjs-
